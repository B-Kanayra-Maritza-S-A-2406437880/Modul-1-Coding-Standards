<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 text-center">
<h3>Create Order</h3>
<hr>

<form method="post" th:action="@{/order/create}" th:object="${order}">
    <div class="form-group">
        <label for="author">Author Name</label>
        <input type="text" class="form-control" id="author"
               th:field="*{author}" placeholder="Enter your name">
    </div>

    <div class="form-group mt-3">
        <label>Products</label>
        <div th:each="product, i : *{products}" class="input-group mb-2">
            <input type="text" class="form-control"
                   th:field="*{products[__${i.index}__].productName}"
                   placeholder="Product Name">
            <input type="number" class="form-control"
                   th:field="*{products[__${i.index}__].productQuantity}"
                   placeholder="Quantity">
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Create Order</button>
    <a th:href="@{/order/history}" class="btn btn-secondary ml-2">View History</a>
</form>
</body>
</html>
