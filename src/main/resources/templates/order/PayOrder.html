<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Pay Order</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 text-center">
<h3>Pay Order</h3>
<hr>

<div class="mb-3">
  <p>Order ID: <strong th:text="${order.id}"></strong></p>
  <p>Author: <strong th:text="${order.author}"></strong></p>
  <p>Status: <strong th:text="${order.status}"></strong></p>
</div>

<form method="post" th:action="@{/order/pay/{id}(id=${order.id})}">
  <div class="form-group">
    <label for="method">Payment Method</label>
    <select class="form-control" id="method" name="method">
      <option value="VOUCHER_CODE">Voucher Code</option>
      <option value="BANK_TRANSFER">Bank Transfer</option>
    </select>
  </div>

  <div id="voucherFields" class="form-group">
    <label for="voucherCode">Voucher Code</label>
    <input type="text" class="form-control" id="voucherCode"
           name="voucherCode" placeholder="Enter voucher code">
  </div>

  <div id="bankFields" class="form-group">
    <label for="bankName">Bank Name</label>
    <input type="text" class="form-control" id="bankName"
           name="bankName" placeholder="Enter bank name">
    <label for="referenceCode" class="mt-2">Reference Code</label>
    <input type="text" class="form-control" id="referenceCode"
           name="referenceCode" placeholder="Enter reference code">
  </div>

  <button type="submit" class="btn btn-primary">Pay</button>
  <a th:href="@{/order/history}" class="btn btn-secondary ml-2">Back</a>
</form>

</body>
</html>
